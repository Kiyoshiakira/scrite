name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt6 and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Ubuntu 24.04 provides Qt6 development packages for modules required by scrite.pro,
          # including Qt PDF which is not consistently available as a Qt5 dev module on 22.04.
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev \
            qt6-tools-dev qt6-tools-dev-tools \
            qt6-multimedia-dev \
            qt6-svg-dev \
            qt6-charts-dev \
            qt6-webengine-dev \
            qt6-pdf-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake6 ../scrite.pro
          make -j"$(nproc)"

      - name: Prepare Scrite Artifact
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}"
          mkdir -p build/artifacts
          # Scrite currently sets DESTDIR to ../Release in scrite.pro; keep a build/ fallback
          # so artifact upload still works if target output layout changes across qmake/Qt versions.
          mapfile -t release_binaries < <(find "${GITHUB_WORKSPACE}/../Release" -type f -executable \( -name Scrite -o -name scrite \) 2>/dev/null | sort)
          mapfile -t build_binaries < <(find "${GITHUB_WORKSPACE}/build" -type f -executable \( -name Scrite -o -name scrite \) 2>/dev/null | sort)
          binaries=("${release_binaries[@]}" "${build_binaries[@]}")
          if [[ "${#binaries[@]}" -eq 0 ]]; then
            echo "::error::Built binary not found (looked for executable Scrite/scrite under Release/ and build/)."
            ls -la ../Release || true
            ls -la build || true
            exit 1
          fi
          # release_binaries are listed first in `binaries`, so this prefers ../Release output.
          binary_path="${binaries[0]}"
          if [[ "${#binaries[@]}" -gt 1 ]]; then
            echo "Found multiple candidate executables:"
            printf ' - %s\n' "${binaries[@]}"
            echo "Using: ${binary_path}"
          fi
          cp -v "${binary_path}" build/artifacts/

      - name: Upload Scrite Binary
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/artifacts/
          if-no-files-found: error
