name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    # Ubuntu 24.04 ships Qt 5.15.x, GCC 14, binutils 2.42, and OpenSSL 3.x
    # out of the box, giving us a modern build environment without extra PPAs.
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Scrite version from qmake project
        run: |
          set -euxo pipefail
          SCRITE_VERSION="$(awk -F'=' '/^VERSION[[:space:]]*=/{gsub(/^[\"'\''[:space:]]+|[\"'\''[:space:]]+$/, "", $2); print $2; exit}' scrite.pro)"
          echo "SCRITE_VERSION=${SCRITE_VERSION}" | tee -a "${GITHUB_ENV}"

      - name: Install Qt5 and Linux packaging dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt5-qmake qtbase5-dev qtbase5-dev-tools qtdeclarative5-dev \
            qtquickcontrols2-5-dev qttools5-dev qttools5-dev-tools \
            qtmultimedia5-dev libqt5svg5-dev libqt5charts5-dev qtwebengine5-dev \
            libhunspell-dev libibus-1.0-dev ibus ibus-m17n imagemagick \
            libssl-dev ca-certificates wget file

      - name: Configure and build in shadow directory (qmake Qt5)
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake ../scrite.pro CONFIG+=release
          make -j"$(nproc)"
          SCRITE_BINARY_PATH="${GITHUB_WORKSPACE}/../Release/Scrite"
          if [[ ! -x "${SCRITE_BINARY_PATH}" ]]; then
            echo "ERROR: expected build output not found or not executable: ${SCRITE_BINARY_PATH}" >&2
            exit 1
          fi
          echo "SCRITE_BINARY_PATH=${SCRITE_BINARY_PATH}" | tee -a "${GITHUB_ENV}"

      - name: Download linuxdeployqt helper
        run: |
          set -euxo pipefail
          # Use linuxdeployqt continuous to match the project's existing Linux packaging flow.
          wget -q -O "${HOME}/linuxdeployqt" "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          file "${HOME}/linuxdeployqt" | grep -E "ELF|AppImage" || { echo "ERROR: Downloaded linuxdeployqt is not a valid ELF/AppImage binary" >&2; exit 1; }
          chmod +x "${HOME}/linuxdeployqt"

      - name: Package AppImage
        run: |
          set -euxo pipefail
          export VERSION="${SCRITE_VERSION}"
          export SCRITE_BINARY_PATH="${SCRITE_BINARY_PATH}"
          export APPIMAGE_EXTRACT_AND_RUN=1
          cd packaging/linux
          chmod +x ./package.sh
          ./package.sh

      - name: Show generated AppImage location
        run: |
          set -euxo pipefail
          ls -la "${GITHUB_WORKSPACE}/packaging/linux"
          APPDIR_PATH="${GITHUB_WORKSPACE}/packaging/linux/Scrite-${SCRITE_VERSION}.AppDir"
          test -d "${APPDIR_PATH}"
          ls -la "${APPDIR_PATH}"
          ls -l "${APPDIR_PATH}/AppRun"
          test ! -L "${APPDIR_PATH}/AppRun"
          test -d "${APPDIR_PATH}/qml"
          test -d "${APPDIR_PATH}/qml/QtQuick/Layouts"
          test -d "${APPDIR_PATH}/qml/QtQuick/Controls.2"
          find "${APPDIR_PATH}/qml" -maxdepth 3 -type d | sort
          find "${GITHUB_WORKSPACE}/packaging/linux" -maxdepth 1 -type f -name "*.AppImage" -print

      - name: Upload Scrite AppImage
        uses: actions/upload-artifact@v4
        with:
          name: "scrite-${{ env.SCRITE_VERSION }}-linux-appimage"
          path: packaging/linux/*.AppImage
          if-no-files-found: error
