name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt6 and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Ubuntu 24.04 provides Qt6 development packages for modules required by scrite.pro,
          # including Qt PDF which is not consistently available as a Qt5 dev module on 22.04.
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev \
            qt6-tools-dev qt6-tools-dev-tools \
            qt6-multimedia-dev \
            qt6-svg-dev \
            qt6-charts-dev \
            qt6-webengine-dev \
            qt6-pdf-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake6 ../scrite.pro
          make -j"$(nproc)"

      - name: Prepare Scrite Artifact
        shell: bash
        run: |
          set -euxo pipefail

          cd "${GITHUB_WORKSPACE}"
          mkdir -p build/artifacts

          echo "== qmake build dir contents =="
          ls -la build || true

          echo "== parent dir contents (in case DESTDIR points outside repo) =="
          ls -la .. || true

          # Collect candidate executables from common output locations.
          # - Some qmake projects set DESTDIR to ../Release or similar.
          # - Sometimes the binary ends up under build/ or a platform subdir.
          mapfile -t candidates < <(
            find .. "${GITHUB_WORKSPACE}/build" "${GITHUB_WORKSPACE}" \
              -maxdepth 6 \
              -type f -executable \
              \( -iname "scrite" -o -iname "Scrite" -o -iname "scrite*" -o -iname "Scrite*" \) \
              2>/dev/null | sort -u
          )

          # If nothing matched by name, fall back to "any executable in likely output dirs"
          # (still limited to avoid grabbing random tool binaries).
          if [[ "${#candidates[@]}" -eq 0 ]]; then
            mapfile -t candidates < <(
              find "${GITHUB_WORKSPACE}/build" .. -maxdepth 4 -type f -executable 2>/dev/null | sort -u
            )
          fi

          if [[ "${#candidates[@]}" -eq 0 ]]; then
            echo "::error::No executable candidates found."
            echo "== tree of build (first 200 files) =="
            find build -maxdepth 4 -type f -print | head -n 200 || true
            echo "== tree of ../Release (if exists) =="
            if [[ -d ../Release ]]; then
              find ../Release -maxdepth 4 -type f -print | head -n 200 || true
            else
              echo "../Release does not exist"
            fi
            exit 1
          fi

          echo "Found executable candidates:"
          printf ' - %s\n' "${candidates[@]}"

          # Prefer something literally named scrite/Scrite if present
          binary_path=""
          for p in "${candidates[@]}"; do
            base="$(basename "$p")"
            if [[ "$base" == "scrite" || "$base" == "Scrite" ]]; then
              binary_path="$p"
              break
            fi
          done
          # Otherwise pick the first candidate.
          if [[ -z "$binary_path" ]]; then
            binary_path="${candidates[0]}"
          fi

          echo "Using binary: ${binary_path}"
          cp -v "${binary_path}" build/artifacts/

          echo "== artifacts dir =="
          ls -la build/artifacts

      - name: Upload Scrite Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/artifacts/**
          if-no-files-found: error
