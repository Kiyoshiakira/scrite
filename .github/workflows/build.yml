name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt6 and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Ubuntu 24.04 provides Qt6 development packages for modules required by scrite.pro,
          # including Qt PDF which is not consistently available as a Qt5 dev module on 22.04.
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev \
            qt6-tools-dev qt6-tools-dev-tools \
            qt6-multimedia-dev \
            qt6-svg-dev \
            qt6-charts-dev \
            qt6-webengine-dev \
            qt6-pdf-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake6 ../scrite.pro
          make -j"$(nproc)"

      - name: Prepare Scrite Artifact
        run: |
          set -euxo pipefail
          mkdir -p build/artifacts
          mapfile -t binaries < <(find Release build -type f -executable \( -name Scrite -o -name scrite \) | sort)
          if [[ "${#binaries[@]}" -eq 0 ]]; then
            echo "::error::Built binary not found (looked for executable Scrite/scrite under Release/ and build/)."
            ls -la Release || true
            ls -la build || true
            exit 1
          fi
          binary_path=""
          for candidate in "${binaries[@]}"; do
            if [[ "${candidate}" == Release/* ]]; then
              binary_path="${candidate}"
              break
            fi
          done
          if [[ -z "${binary_path}" ]]; then
            binary_path="${binaries[0]}"
          fi
          if [[ "${#binaries[@]}" -gt 1 ]]; then
            echo "Found multiple candidate executables:"
            printf ' - %s\n' "${binaries[@]}"
            echo "Using: ${binary_path}"
          fi
          if [[ -n "${binary_path}" ]]; then
            cp -v "${binary_path}" build/artifacts/
          else
            echo "::error::Unable to determine artifact binary path."
            exit 1
          fi

      - name: Upload Scrite Binary
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/artifacts/
          if-no-files-found: error
