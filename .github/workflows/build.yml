name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt5 and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt5-qmake qtbase5-dev qtbase5-dev-tools qtdeclarative5-dev \
            qtquickcontrols2-5-dev \
            qtmultimedia5-dev \
            libqt5svg5-dev \
            libqt5charts5-dev \
            qtwebengine5-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: CI patch disable Qt PDF module
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            perl -i -pe '
              if (/^\s*QT\s*\+?=/) {
                s/(^|\s)pdf(?=\s|$)/ /g;
                s/[ \t]+/ /g;
                s/[ \t]+$//;
                $_ = "" if /^\s*QT\s*\+?=\s*$/;
              }
            ' "$file"
          done < <(find . -type f \( -name "*.pro" -o -name "*.pri" \) -print0)

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake ../scrite.pro
          make -j"$(nproc)"

      - name: Prepare Scrite Artifact
        run: |
          set -euxo pipefail
          mkdir -p build/artifacts
          if [[ -f ../Release/Scrite ]]; then
            cp -v ../Release/Scrite build/artifacts/
          elif [[ -f ../Release/scrite ]]; then
            cp -v ../Release/scrite build/artifacts/
          else
            echo "::error::Built binary not found (expected ../Release/Scrite)."
            ls -la ../Release || true
            exit 1
          fi

      - name: Upload Scrite Binary
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/artifacts/
          if-no-files-found: error
