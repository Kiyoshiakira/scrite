name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt5-qmake qtbase5-dev qtbase5-dev-tools qtdeclarative5-dev \
            qtquickcontrols2-5-dev \
            qtmultimedia5-dev \
            libqt5svg5-dev \
            libqt5charts5-dev \
            qtwebengine5-dev \
            libqt5pdf5-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: Verify ibus dev package
        run: |
          set -euxo pipefail
          dpkg -l | grep -E 'libibus|ibus' || true
          pkg-config --modversion ibus-1.0
          pkg-config --cflags --libs ibus-1.0

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake ../scrite.pro
          make -j"$(nproc)"

      - name: Upload Scrite Binary
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/scrite
