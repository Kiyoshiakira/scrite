name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt6 and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev \
            qt6-tools-dev qt6-tools-dev-tools \
            qt6-multimedia-dev \
            qt6-svg-dev \
            qt6-charts-dev \
            qt6-webengine-dev \
            qt6-pdf-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake6 ../scrite.pro
          make -j"$(nproc)"

      - name: Show output locations (sanity check)
        run: |
          set -euxo pipefail
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "== build dir =="
          ls -la "${GITHUB_WORKSPACE}/build" || true
          echo "== ../Release dir (expected Scrite output) =="
          ls -la "${GITHUB_WORKSPACE}/../Release" || true
          echo "== find Scrite executable near workspace =="
          find "${GITHUB_WORKSPACE}/.." -maxdepth 3 -type f -executable \( -name Scrite -o -name scrite \) -print || true

      - name: Prepare artifact folder
        run: |
          set -euxo pipefail
          mkdir -p build/artifacts
          test -f "${GITHUB_WORKSPACE}/../Release/Scrite"
          cp -v "${GITHUB_WORKSPACE}/../Release/Scrite" build/artifacts/

      - name: Upload Scrite Binary
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/artifacts/Scrite
          if-no-files-found: error
