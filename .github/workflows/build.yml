name: Build Scrite Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt5 and Build Essentials
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt5-qmake qtbase5-dev qtbase5-dev-tools qtdeclarative5-dev \
            qtquickcontrols2-5-dev \
            qtmultimedia5-dev \
            libqt5svg5-dev \
            libqt5charts5-dev \
            qtwebengine5-dev \
            libhunspell-dev libssl-dev imagemagick \
            libibus-1.0-dev

      - name: CI patch: disable Qt PDF module requirement (temporary)
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
import pathlib
import re

# Remove the token 'pdf' from any "QT +=" lines in *.pro/*.pri.
# This modifies the CI workspace only; it does not commit anything back.

files = []
for pat in ("*.pro", "*.pri"):
    files.extend(pathlib.Path(".").rglob(pat))

qt_re = re.compile(r"^\s*QT\s*\+=\s*(.*)$")

for p in files:
    lines = p.read_text(encoding="utf-8", errors="ignore").splitlines(True)
    changed = False
    out = []
    for line in lines:
        if line.lstrip().startswith("#"):
            out.append(line)
            continue

        m = qt_re.match(line)
        if m and "pdf" in line:
            before, modules = line.split("+=", 1)
            tokens = modules.strip().split()
            tokens = [t for t in tokens if t != "pdf"]
            out.append(before + "+= " + " ".join(tokens) + "\n")
            changed = True
        else:
            out.append(line)

    if changed:
        p.write_text("".join(out), encoding="utf-8")
        print(f"Patched: {p}")
          PY

      - name: Configure and Build
        run: |
          set -euxo pipefail
          mkdir -p build
          cd build
          qmake ../scrite.pro
          make -j"$(nproc)"

      - name: Upload Scrite Binary
        uses: actions/upload-artifact@v4
        with:
          name: scrite-ubuntu-app
          path: build/scrite
